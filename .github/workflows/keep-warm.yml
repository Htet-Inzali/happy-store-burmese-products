name: Keep Backend Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend (retry, never fail)
        run: |
          echo "Pinging backend at $(date -u)"
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
              https://happy-store-burmese-products.onrender.com/api/ping || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is warm."
              exit 0
            fi
            echo "Waking up, retry in 30s..."
            sleep 30
          done
          echo "::notice::No 200 this run; will retry next schedule."
          exit 0
